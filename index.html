<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-emerald-400 flex items-center gap-2">
                    <span class="p-2 bg-emerald-500/10 rounded-lg">💰</span> Meu Financeiro
                </h1>
                <p class="text-slate-400 text-sm mt-1">Sincronizado em tempo real com OneDrive</p>
            </div>
            <button onclick="buscarDados()" id="btnSync" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg shadow-emerald-900/20">
                Atualizar Dados ↻
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl shadow-xl border-l-4 border-emerald-500">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-widest mb-1">Entradas</p>
                <h2 id="totalEntradas" class="text-3xl font-black text-white">R$ 0,00</h2>
            </div>
            <div class="glass p-6 rounded-2xl shadow-xl border-l-4 border-rose-500">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-widest mb-1">Saídas</p>
                <h2 id="totalSaidas" class="text-3xl font-black text-rose-400">R$ 0,00</h2>
            </div>
            <div class="glass p-6 rounded-2xl shadow-xl border-l-4 border-blue-500 bg-gradient-to-br from-slate-800/50 to-slate-900/50">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-widest mb-1">Saldo Atual</p>
                <h2 id="saldoTotal" class="text-3xl font-black text-blue-400">R$ 0,00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass rounded-2xl overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/30">
                    <h3 class="font-bold">Extrato de Movimentações</h3>
                    <span id="status" class="text-[10px] text-emerald-500 font-mono animate-pulse uppercase">Online</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/50 text-slate-500 text-[10px] uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Data</th>
                                <th class="px-6 py-4">Descrição / Categoria</th>
                                <th class="px-6 py-4 text-right">Valor</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela" class="divide-y divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl shadow-2xl">
                <h3 class="font-bold mb-6 text-center text-slate-300">Resumo Visual</h3>
                <canvas id="graficoFinanceiro"></canvas>
                <div class="mt-8 space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400 italic">Planilha OneDrive:</span>
                        <span class="text-emerald-400 font-bold">Conectada</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO IMPORTANTE ---
        // Substitua abaixo pela URL que você pegou no Sheet.best
        const MINHA_URL_API = "COLE_AQUI_SUA_URL_DO_SHEET_BEST";

        let chartInstancia = null;

        async function buscarDados() {
            const btn = document.getElementById('btnSync');
            const statusLabel = document.getElementById('status');
            
            btn.innerText = "Sincronizando...";
            btn.classList.add('opacity-50');
            statusLabel.innerText = "Atualizando...";

            try {
                const response = await fetch(MINHA_URL_API);
                const dados = await response.json();
                
                let html = "";
                let entradas = 0;
                let saidas = 0;

                dados.forEach(item => {
                    // Limpeza de valores para garantir que o JS entenda como número
                    const valorStr = item.Valor ? item.Valor.toString() : "0";
                    const valorLimpo = valorStr.replace('R$', '').replace('.', '').replace(',', '.').trim();
                    const valorNum = parseFloat(valorLimpo) || 0;

                    if (valorNum > 0) entradas += valorNum;
                    else saidas += Math.abs(valorNum);

                    html += `
                        <tr class="hover:bg-slate-700/20 transition-colors">
                            <td class="px-6 py-4 text-sm text-slate-400">${item.Data || '---'}</td>
                            <td class="px-6 py-4 text-sm font-semibold">${item.Descricao || item.Categoria || 'Sem descrição'}</td>
                            <td class="px-6 py-4 text-right font-black ${valorNum > 0 ? 'text-emerald-400' : 'text-rose-400'}">
                                ${valorNum > 0 ? '+' : ''} R$ ${valorNum.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('corpoTabela').innerHTML = html;
                document.getElementById('totalEntradas').innerText = `R$ ${entradas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                document.getElementById('totalSaidas').innerText = `R$ ${saidas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                document.getElementById('saldoTotal').innerText = `R$ ${(entradas - saidas).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                
                atualizarGrafico(entradas, saidas);
                statusLabel.innerText = "Online";

            } catch (error) {
                console.error("Erro na busca:", error);
                statusLabel.innerText = "Erro de conexão";
            } finally {
                btn.innerText = "Atualizar Dados ↻";
                btn.classList.remove('opacity-50');
            }
        }

        function atualizarGrafico(ent, sai) {
            const ctx = document.getElementById('graficoFinanceiro').getContext('2d');
            
            if (chartInstancia) {
                chartInstancia.destroy();
            }

            chartInstancia = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Entradas', 'Saídas'],
                    datasets: [{
                        data: [ent, sai],
                        backgroundColor: ['#10b981', '#f43f5e'],
                        hoverOffset: 10,
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 12 } } }
                    },
                    cutout: '80%'
                }
            });
        }

        // Carrega os dados automaticamente ao abrir a página
        if (MINHA_URL_API !== "COLE_AQUI_SUA_URL_DO_SHEET_BEST") {
            buscarDados();
        } else {
            document.getElementById('status').innerText = "Configuração pendente";
            document.getElementById('corpoTabela').innerHTML = "<tr><td colspan='3' class='p-10 text-center text-slate-500'>Por favor, insira sua URL do Sheet.best no código para ver seus dados.</td></tr>";
        }
    </script>
</body>
</html>
