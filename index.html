<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0b1120; color: #f1f5f9; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 glass-panel p-6 rounded-2xl">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-indigo-500/20 text-indigo-400 rounded-xl">
                    <i class="ph ph-wallet text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
                        Controle Financeiro
                    </h1>
                    <p class="text-slate-400 text-sm mt-1 flex items-center gap-2">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                        <span id="status-text">Conectando ao Google Sheets...</span>
                    </p>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <div class="relative w-full sm:w-48">
                    <select id="filtroMes" onchange="atualizarDashboardParaMes(this.value)" class="w-full appearance-none bg-slate-800/80 border border-slate-700 text-slate-200 py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium cursor-pointer transition-colors">
                        <option value="Todos">Visão Geral (Ano)</option>
                    </select>
                    <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                </div>
                
                <button onclick="buscarDados()" id="btnSync" class="group bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-medium transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-900/30 w-full sm:w-auto">
                    <i class="ph ph-arrows-clockwise text-xl group-hover:rotate-180 transition-transform duration-500"></i> Sincronizar
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel p-6 rounded-2xl card-hover relative overflow-hidden group">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-slate-400 text-sm font-semibold tracking-wide uppercase">Entradas (Geral)</p>
                    <span class="p-1.5 bg-emerald-500/10 text-emerald-400 rounded-lg"><i class="ph ph-arrow-up-right"></i></span>
                </div>
                <h2 id="totalEntradas" class="text-4xl font-bold text-slate-100">R$ 0,00</h2>
            </div>

            <div class="glass-panel p-6 rounded-2xl card-hover relative overflow-hidden group">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-slate-400 text-sm font-semibold tracking-wide uppercase">Saídas (Geral)</p>
                    <span class="p-1.5 bg-rose-500/10 text-rose-400 rounded-lg"><i class="ph ph-arrow-down-left"></i></span>
                </div>
                <h2 id="totalSaidas" class="text-4xl font-bold text-rose-400">R$ 0,00</h2>
            </div>

            <div class="glass-panel p-6 rounded-2xl card-hover relative overflow-hidden border-indigo-500/30 shadow-[0_0_30px_-10px_rgba(99,102,241,0.2)]">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-slate-300 text-sm font-semibold tracking-wide uppercase">Saldo Líquido</p>
                    <span class="p-1.5 bg-indigo-500/20 text-indigo-400 rounded-lg"><i class="ph ph-coins"></i></span>
                </div>
                <h2 id="saldoTotal" class="text-4xl font-bold text-indigo-300">R$ 0,00</h2>
            </div>
        </div>

        <h3 class="font-semibold text-lg text-slate-300 mb-4 flex items-center gap-2"><i class="ph ph-credit-card text-purple-400"></i> Faturas de Cartão</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass-panel p-5 rounded-xl border-l-4 border-purple-500 flex justify-between items-center bg-gradient-to-r from-purple-900/20 to-transparent">
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">Nubank</p>
                    <h3 id="faturaNubank" class="text-2xl font-bold text-purple-300">R$ 0,00</h3>
                </div>
                <i class="ph ph-bank text-3xl text-purple-500/50"></i>
            </div>
            <div class="glass-panel p-5 rounded-xl border-l-4 border-red-500 flex justify-between items-center bg-gradient-to-r from-red-900/20 to-transparent">
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">Santander</p>
                    <h3 id="faturaSantander" class="text-2xl font-bold text-red-300">R$ 0,00</h3>
                </div>
                <i class="ph ph-bank text-3xl text-red-500/50"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-panel p-6 rounded-2xl flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-semibold text-lg flex items-center gap-2"><i class="ph ph-chart-bar text-indigo-400"></i> Evolução Mensal</h3>
                </div>
                <div class="flex-grow w-full h-[300px] relative">
                    <canvas id="graficoEvolucao"></canvas>
                </div>
            </div>

            <div class="glass-panel rounded-2xl overflow-hidden flex flex-col">
                <div class="p-6 border-b border-slate-700/50 bg-slate-800/30">
                    <h3 class="font-semibold text-lg flex items-center gap-2"><i class="ph ph-list-dashes text-indigo-400"></i> Detalhamento Geral</h3>
                </div>
                <div class="p-0 overflow-y-auto max-h-[300px]">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-900/80 text-slate-400 sticky top-0">
                            <tr>
                                <th class="px-6 py-3 font-medium">Mês</th>
                                <th class="px-6 py-3 font-medium text-right">Entrada</th>
                                <th class="px-6 py-3 font-medium text-right">Saída</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela" class="divide-y divide-slate-800/50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MINHA_URL_API = "https://api.sheetbest.com/sheets/5b629142-f077-44bc-ab30-20747db77f0a";
        let dadosGlobais = [];
        let graficoInstancia = null;

        function converterMoedaParaNumero(valor) {
            if (!valor) return 0;
            if (typeof valor === 'number') return valor;
            let valorLimpo = valor.toString().replace(/R\$\s*/g, '').replace(/\./g, '').replace(',', '.').trim();
            if (valorLimpo.startsWith('-')) {
                valorLimpo = valorLimpo.replace('-', '');
                return -(parseFloat(valorLimpo) || 0);
            }
            return parseFloat(valorLimpo) || 0;
        }

        async function buscarDados() {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            const btnSync = document.getElementById('btnSync');
            
            statusText.innerText = "Sincronizando...";
            statusDot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            btnSync.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const response = await fetch(MINHA_URL_API);
                if (!response.ok) throw new Error("Erro na requisição. Verifique se a aba correta é a primeira.");
                const dadosBrutos = await response.json();
                
                // Filtra para pegar apenas as linhas que têm o nome do mês preenchido na coluna 'Mes'
                dadosGlobais = dadosBrutos.filter(item => 
                    item.Mes && 
                    item.Mes.trim() !== '' &&
                    !item.Mes.toLowerCase().includes('total') // Ignora a linha de "Total Ano" se houver
                );

                if(dadosGlobais.length === 0) {
                     throw new Error("Nenhum dado encontrado. Verifique se a coluna A se chama 'Mes' na primeira linha.");
                }

                popularFiltroMeses(dadosGlobais);
                atualizarDashboardParaMes("Todos"); 
                
                renderizarTabelaCompleta(dadosGlobais);
                renderizarGrafico(dadosGlobais);

                statusText.innerText = "Conectado e Atualizado";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
            } catch (error) {
                console.error("Erro completo:", error);
                statusText.innerText = error.message.includes("Nenhum dado") ? "Erro: Nomes das colunas incorretos." : "Erro ao conectar à API.";
                statusDot.className = "w-2 h-2 rounded-full bg-rose-500";
            } finally {
                btnSync.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function popularFiltroMeses(dados) {
            const select = document.getElementById('filtroMes');
            select.innerHTML = '<option value="Todos">Visão Geral (Ano)</option>';
            dados.forEach(item => {
                const mes = item.Mes.trim();
                if(mes) {
                    const option = document.createElement('option');
                    option.value = mes;
                    option.textContent = mes;
                    select.appendChild(option);
                }
            });
        }

        function atualizarDashboardParaMes(mesSelecionado) {
            let totalEnt = 0, totalSai = 0, totalLiq = 0, faturaNu = 0, faturaSan = 0;

            if (mesSelecionado === "Todos") {
                dadosGlobais.forEach(item => {
                    totalEnt += converterMoedaParaNumero(item.EntradaGeral);
                    totalSai += converterMoedaParaNumero(item.SaidaGeral);
                    faturaNu += converterMoedaParaNumero(item.SaidaNubank);
                    faturaSan += converterMoedaParaNumero(item.SaidaSantander);
                });
                totalLiq = totalEnt - totalSai;
            } else {
                const dadosMes = dadosGlobais.find(item => item.Mes.trim() === mesSelecionado);
                if (dadosMes) {
                    totalEnt = converterMoedaParaNumero(dadosMes.EntradaGeral);
                    totalSai = converterMoedaParaNumero(dadosMes.SaidaGeral);
                    totalLiq = converterMoedaParaNumero(dadosMes.Liquido);
                    faturaNu = converterMoedaParaNumero(dadosMes.SaidaNubank);
                    faturaSan = converterMoedaParaNumero(dadosMes.SaidaSantander);
                }
            }

            animarValor('totalEntradas', totalEnt);
            animarValor('totalSaidas', totalSai);
            animarValor('saldoTotal', totalLiq);
            animarValor('faturaNubank', faturaNu, true); // true para formatação simples
            animarValor('faturaSantander', faturaSan, true);
        }

        function renderizarTabelaCompleta(dados) {
            let html = "";
            dados.forEach(item => {
                const ent = converterMoedaParaNumero(item.EntradaGeral);
                const sai = converterMoedaParaNumero(item.SaidaGeral);
                html += `
                    <tr class="hover:bg-slate-800/50 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-300">${item.Mes}</td>
                        <td class="px-6 py-4 text-right text-emerald-400 font-medium">R$ ${ent.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td class="px-6 py-4 text-right text-rose-400 font-medium">R$ ${sai.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    </tr>
                `;
            });
            document.getElementById('corpoTabela').innerHTML = html;
        }

        function renderizarGrafico(dados) {
            const ctx = document.getElementById('graficoEvolucao').getContext('2d');
            if (graficoInstancia) graficoInstancia.destroy();

            const labels = dados.map(item => item.Mes);
            const dadosEntradas = dados.map(item => converterMoedaParaNumero(item.EntradaGeral));
            const dadosSaidas = dados.map(item => converterMoedaParaNumero(item.SaidaGeral));

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Outfit', sans-serif";

            graficoInstancia = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Entradas', data: dadosEntradas, backgroundColor: 'rgba(16, 185, 129, 0.8)', borderRadius: 4 },
                        { label: 'Saídas', data: dadosSaidas, backgroundColor: 'rgba(244, 63, 94, 0.8)', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { color: 'rgba(148, 163, 184, 0.1)' }, ticks: { callback: v => 'R$ ' + (v/1000) + 'k' } }
                    }
                }
            });
        }

        function animarValor(idElemento, valorFinal, formatoSimples = false) {
            const elemento = document.getElementById(idElemento);
            const formatado = Math.abs(valorFinal).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            if(idElemento === 'saldoTotal' && !formatoSimples) {
                if(valorFinal < 0) {
                    elemento.className = "text-4xl font-bold text-rose-500";
                    elemento.innerText = `- R$ ${formatado}`;
                } else {
                    elemento.className = "text-4xl font-bold text-indigo-300";
                    elemento.innerText = `R$ ${formatado}`;
                }
            } else {
                elemento.innerText = `R$ ${formatado}`;
            }
        }

        buscarDados();
    </script>
</body>
</html>
